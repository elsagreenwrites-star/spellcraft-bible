<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellcraft Series Bible</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #0e0c0a; color: #e8e0d0; min-height: 100vh; }

  .app { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header { text-align: center; margin-bottom: 2.5rem; border-bottom: 1px solid #3a2e22; padding-bottom: 2rem; }
  .header h1 { font-size: 2.2rem; font-weight: normal; letter-spacing: 0.12em; color: #c9a96e; text-transform: uppercase; }
  .header p { font-size: 0.85rem; color: #7a6a55; letter-spacing: 0.08em; margin-top: 0.4rem; text-transform: uppercase; }

  .import-zone { background: #1a1510; border: 1px dashed #3a2e22; border-radius: 4px; padding: 1.5rem; margin-bottom: 2rem; }
  .import-zone h2 { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #7a6a55; margin-bottom: 1rem; }
  .import-row { display: flex; gap: 0.75rem; align-items: flex-start; }
  .import-row textarea { flex: 1; background: #0e0c0a; border: 1px solid #3a2e22; color: #c8bca8; font-family: 'Courier New', monospace; font-size: 0.75rem; padding: 0.75rem; border-radius: 3px; resize: vertical; min-height: 80px; }
  .import-row textarea:focus { outline: none; border-color: #c9a96e; }
  .import-row button { background: #c9a96e; color: #0e0c0a; border: none; padding: 0.6rem 1.2rem; border-radius: 3px; cursor: pointer; font-size: 0.8rem; letter-spacing: 0.05em; white-space: nowrap; font-weight: bold; }
  .import-row button:hover { background: #dfc080; }
  .import-status { font-size: 0.75rem; color: #7a6a55; margin-top: 0.5rem; }
  .import-status.ok { color: #6aaa6a; }
  .import-status.err { color: #cc6666; }

  .nav { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid #3a2e22; overflow-x: auto; }
  .nav-btn { background: none; border: none; color: #7a6a55; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.6rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; font-family: Georgia, serif; transition: color 0.15s; }
  .nav-btn:hover { color: #c9a96e; }
  .nav-btn.active { color: #c9a96e; border-bottom-color: #c9a96e; }

  .search-bar { margin-bottom: 1.5rem; }
  .search-bar input { width: 100%; background: #1a1510; border: 1px solid #3a2e22; color: #e8e0d0; padding: 0.6rem 1rem; border-radius: 3px; font-size: 0.9rem; font-family: Georgia, serif; }
  .search-bar input:focus { outline: none; border-color: #c9a96e; }

  .count-line { font-size: 0.72rem; color: #5a4e3e; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.2rem; }

  .cards { display: flex; flex-direction: column; gap: 1rem; }

  .card { background: #1a1510; border: 1px solid #3a2e22; border-radius: 4px; overflow: hidden; }
  .card-header { display: flex; justify-content: space-between; align-items: baseline; padding: 0.9rem 1.2rem; cursor: pointer; user-select: none; }
  .card-header:hover { background: #201810; }
  .card-title { font-size: 1rem; color: #c9a96e; font-style: italic; }
  .card-meta { font-size: 0.72rem; color: #5a4e3e; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-chevron { font-size: 0.7rem; color: #5a4e3e; margin-left: 0.5rem; transition: transform 0.2s; }
  .card.open .card-chevron { transform: rotate(180deg); }
  .card-body { padding: 0 1.2rem 1rem; display: none; border-top: 1px solid #2a2018; }
  .card.open .card-body { display: block; }

  .field { margin-top: 0.85rem; }
  .field-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: #7a6a55; margin-bottom: 0.25rem; }
  .field-value { font-size: 0.88rem; color: #c8bca8; line-height: 1.6; }
  .tag { display: inline-block; background: #2a2018; border: 1px solid #3a2e22; border-radius: 2px; font-size: 0.68rem; padding: 0.15rem 0.45rem; color: #9a8a6a; letter-spacing: 0.05em; margin: 0.15rem 0.15rem 0 0; }
  .tag.critical { background: #2a1515; border-color: #5a2a2a; color: #cc8888; }
  .tag.high { background: #2a2010; border-color: #5a4020; color: #cc9966; }
  .tag.medium { background: #1a2020; border-color: #2a4040; color: #88aaaa; }
  .tag.resolved { background: #152015; border-color: #2a4a2a; color: #88aa88; }
  .tag.developing { background: #202020; border-color: #404040; color: #888888; }

  .empty { text-align: center; padding: 3rem; color: #5a4e3e; font-style: italic; font-size: 0.9rem; }
  .empty strong { display: block; color: #7a6a55; font-style: normal; font-size: 1rem; margin-bottom: 0.5rem; }

  .book-badge { display: inline-block; background: #1a2030; border: 1px solid #2a3a5a; border-radius: 2px; font-size: 0.65rem; padding: 0.1rem 0.4rem; color: #8899bb; letter-spacing: 0.04em; margin: 0.1rem 0.1rem 0 0; }

  .progress-bar { height: 4px; background: #2a2018; border-radius: 2px; margin-top: 0.4rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #c9a96e; border-radius: 2px; transition: width 0.3s; }

  .rel-type { display: inline-block; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 2px; background: #2a2518; border: 1px solid #4a4030; color: #9a8a6a; }
  .rel-type.romantic { background: #2a1525; border-color: #5a3050; color: #cc88aa; }
  .rel-type.family { background: #152025; border-color: #2a4050; color: #88aacc; }
  .rel-type.ally { background: #152015; border-color: #2a4a2a; color: #88aa88; }
  .rel-type.antagonist { background: #2a1515; border-color: #5a2a2a; color: #cc8888; }

  .stats-bar { display: flex; gap: 1.5rem; padding: 1rem 0; border-bottom: 1px solid #2a2018; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-n { font-size: 1.5rem; color: #c9a96e; font-weight: normal; }
  .stat-l { font-size: 0.65rem; color: #5a4e3e; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.1rem; }

  .delete-btn { background: none; border: none; color: #3a2e22; cursor: pointer; font-size: 0.7rem; padding: 0.2rem 0.4rem; border-radius: 2px; }
  .delete-btn:hover { color: #cc6666; background: #2a1515; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.5rem; }
    .nav-btn { padding: 0.5rem 0.7rem; font-size: 0.65rem; }
    .import-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Spellcraft</h1>
    <p>Series Bible &nbsp;·&nbsp; Elsa Green</p>
  </div>

  <div class="import-zone">
    <h2>Import Book Data</h2>
    <div class="import-row">
      <textarea id="import-input" placeholder='Paste JSON extraction here (from Claude)…'></textarea>
      <button onclick="importData()">Import ↑</button>
    </div>
    <div class="import-status" id="import-status"></div>
  </div>

  <div class="nav" id="nav">
    <button class="nav-btn active" onclick="switchTab('characters')">Characters</button>
    <button class="nav-btn" onclick="switchTab('lore')">World & Lore</button>
    <button class="nav-btn" onclick="switchTab('plotArcs')">Plot Arcs</button>
    <button class="nav-btn" onclick="switchTab('relationships')">Relationships</button>
    <button class="nav-btn" onclick="switchTab('locations')">Locations</button>
    <button class="nav-btn" onclick="switchTab('factions')">Factions</button>
    <button class="nav-btn" onclick="switchTab('openThreads')">Open Threads</button>
    <button class="nav-btn" onclick="switchTab('magicSystem')">Magic</button>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search…" oninput="render()">
  </div>

  <div class="count-line" id="count-line"></div>
  <div class="cards" id="cards"></div>
</div>

<script>
const STORAGE_KEY = 'spellcraft_bible_v2';
let db = { characters: [], lore: [], plotArcs: [], relationships: [], locations: [], factions: [], openThreads: [], magicSystem: [] };
let currentTab = 'characters';
let openCards = new Set();

async function load() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) db = { ...db, ...JSON.parse(r) };
  } catch(e) {}
  render();
}

async function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
}

function importData() {
  const raw = document.getElementById('import-input').value.trim();
  const status = document.getElementById('import-status');
  if (!raw) { status.textContent = 'Paste JSON first.'; status.className = 'import-status err'; return; }
  let data;
  try { data = JSON.parse(raw); } catch(e) { status.textContent = 'Invalid JSON — check format.'; status.className = 'import-status err'; return; }

  const sectionMap = {
    characters: ['characters'],
    lore: ['lore'],
    plotArcs: ['plotArcs', 'plot_arcs', 'plots'],
    relationships: ['relationships'],
    locations: ['locations'],
    factions: ['factions'],
    openThreads: ['openThreads', 'open_threads', 'threads'],
    magicSystem: ['magicSystem', 'magic_system', 'magic']
  };

  let imported = 0;
  let bookName = data.book || data.bookTitle || data.title || '';

  for (const [key, aliases] of Object.entries(sectionMap)) {
    for (const alias of aliases) {
      if (Array.isArray(data[alias])) {
        const items = data[alias].map(item => {
          if (bookName && !item.books) item = { ...item, books: [bookName] };
          return item;
        });
        const existing = db[key] || [];
        const names = new Set(existing.map(x => (x.name || x.title || x.characterA + x.characterB || '').toLowerCase()));
        const newItems = items.filter(x => {
          const id = (x.name || x.title || x.characterA + x.characterB || '').toLowerCase();
          return !names.has(id);
        });
        db[key] = [...existing, ...newItems];
        imported += newItems.length;
        break;
      }
    }
  }

  if (imported === 0) { status.textContent = 'No new entries found (may already be imported, or wrong format).'; status.className = 'import-status'; }
  else { status.textContent = `✓ Imported ${imported} new entries${bookName ? ' from ' + bookName : ''}.`; status.className = 'import-status ok'; }

  document.getElementById('import-input').value = '';
  save();
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    const tabs = ['characters','lore','plotArcs','relationships','locations','factions','openThreads','magicSystem'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('search').value = '';
  openCards.clear();
  render();
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render();
}

function getItems() {
  return db[currentTab] || [];
}

function search(items) {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) return items;
  return items.filter(item => JSON.stringify(item).toLowerCase().includes(q));
}

function getItemId(item) {
  return item.name || item.title || item.system || item.question || (item.characterA + '↔' + item.characterB) || JSON.stringify(item).slice(0,40);
}

function urgencyClass(u) {
  if (!u) return '';
  u = u.toLowerCase();
  if (u === 'critical') return 'critical';
  if (u === 'high') return 'high';
  if (u === 'medium') return 'medium';
  return '';
}

function statusClass(s) {
  if (!s) return '';
  s = s.toLowerCase();
  if (s.includes('resolved')) return 'resolved';
  if (s.includes('develop') || s.includes('progress')) return 'developing';
  return '';
}

function relClass(t) {
  if (!t) return '';
  t = t.toLowerCase();
  if (t.includes('romantic')) return 'romantic';
  if (t.includes('family')) return 'family';
  if (t.includes('ally') || t.includes('friend')) return 'ally';
  if (t.includes('antag') || t.includes('rival') || t.includes('trauma')) return 'antagonist';
  return '';
}

function field(label, val) {
  if (!val) return '';
  return `<div class="field"><div class="field-label">${label}</div><div class="field-value">${val}</div></div>`;
}

function books(arr) {
  if (!arr || !arr.length) return '';
  return arr.map(b => `<span class="book-badge">${b}</span>`).join('');
}

function renderCharacter(c, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${c.name || 'Unnamed'}</span>
        ${c.species ? `<span class="card-meta" style="margin-left:0.75rem">${c.species}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        ${c.role ? `<span class="tag">${c.role}</span>` : ''}
        <span class="card-chevron">▼</span>
      </div>
    </div>
    ${open ? `<div class="card-body">
      ${c.books ? `<div class="field">${books(c.books)}</div>` : ''}
      ${field('Appearance', c.appearance)}
      ${field('Personality', c.personality)}
      ${field('Abilities', c.abilities)}
      ${field('Backstory', c.backstory)}
      ${field('First Appearance', c.firstAppearance)}
      ${field('Arc', c.arc)}
      ${c.deathNote ? field('Death Note', `<em>${c.deathNote}</em>`) : ''}
      ${c.seriesSignificance ? field('Series Significance', `<strong>${c.seriesSignificance}</strong>`) : ''}
    </div>` : ''}
  </div>`;
}

function renderLore(l, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${l.title || 'Untitled'}</span>
        ${l.category ? `<span class="card-meta" style="margin-left:0.75rem">${l.category}</span>` : ''}
      </div>
      <span class="card-chevron">▼</span>
    </div>
    ${open ? `<div class="card-body">
      ${field('Detail', l.detail)}
    </div>` : ''}
  </div>`;
}

function renderArc(a, id) {
  const open = openCards.has(id);
  const pct = a.progressPercent || 0;
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${a.title || 'Untitled'}</span>
        ${a.type ? `<span class="card-meta" style="margin-left:0.75rem">${a.type}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        ${a.status ? `<span class="tag ${statusClass(a.status)}">${a.status}</span>` : ''}
        <span class="card-chevron">▼</span>
      </div>
    </div>
    ${open ? `<div class="card-body">
      ${field('Last Seen', a.lastSeen)}
      <div class="field">
        <div class="field-label">Progress — ${pct}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${field('Description', a.description)}
    </div>` : ''}
  </div>`;
}

function renderRelationship(r, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${r.characterA} <span style="color:#5a4e3e;font-style:normal">↔</span> ${r.characterB}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        ${r.type ? `<span class="rel-type ${relClass(r.type)}">${r.type}</span>` : ''}
        <span class="card-chevron">▼</span>
      </div>
    </div>
    ${open ? `<div class="card-body">
      ${r.status ? field('Status', `<span class="tag ${statusClass(r.status)}">${r.status}</span>`) : ''}
      ${field('Last Seen', r.lastSeen)}
      ${field('Notes', r.notes)}
    </div>` : ''}
  </div>`;
}

function renderLocation(l, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${l.name || 'Unnamed'}</span>
        ${l.type ? `<span class="card-meta" style="margin-left:0.75rem">${l.type}</span>` : ''}
      </div>
      <span class="card-chevron">▼</span>
    </div>
    ${open ? `<div class="card-body">
      ${field('Description', l.description)}
      ${field('Significance', l.significance)}
    </div>` : ''}
  </div>`;
}

function renderFaction(f, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div>
        <span class="card-title">${f.name || 'Unnamed'}</span>
        ${f.type ? `<span class="card-meta" style="margin-left:0.75rem">${f.type}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        ${f.alignment ? `<span class="tag ${f.alignment.includes('antag') ? 'critical' : f.alignment.includes('neutral') ? '' : 'resolved'}">${f.alignment}</span>` : ''}
        <span class="card-chevron">▼</span>
      </div>
    </div>
    ${open ? `<div class="card-body">
      ${field('Leader', f.leader)}
      ${field('Goal', f.goal)}
    </div>` : ''}
  </div>`;
}

function renderThread(t, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <div style="flex:1;padding-right:1rem">
        <span class="card-title" style="font-size:0.9rem">${(t.question || 'Unnamed').substring(0, 90)}${(t.question||'').length > 90 ? '…' : ''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
        ${t.urgency ? `<span class="tag ${urgencyClass(t.urgency)}">${t.urgency}</span>` : ''}
        <span class="card-chevron">▼</span>
      </div>
    </div>
    ${open ? `<div class="card-body">
      ${field('Introduced In', t.introducedIn)}
      ${field('Book', t.book)}
      ${field('Full Question', t.question)}
    </div>` : ''}
  </div>`;
}

function renderMagic(m, id) {
  const open = openCards.has(id);
  return `<div class="card ${open ? 'open' : ''}">
    <div class="card-header" onclick="toggleCard('${id.replace(/'/g,"\\'")}')">
      <span class="card-title">${m.system || m.title || 'Unnamed'}</span>
      <span class="card-chevron">▼</span>
    </div>
    ${open ? `<div class="card-body">
      ${field('Rules', m.rules)}
      ${field('Limitations', m.limitations)}
      ${field('Users', m.users)}
    </div>` : ''}
  </div>`;
}

function render() {
  const items = search(getItems());
  const total = getItems().length;
  const filtered = items.length;

  const countLine = document.getElementById('count-line');
  countLine.textContent = filtered < total ? `${filtered} of ${total} entries` : `${total} entries`;

  const container = document.getElementById('cards');

  if (!total) {
    container.innerHTML = `<div class="empty"><strong>No data yet</strong>Import a JSON extraction above to populate this section.</div>`;
    return;
  }
  if (!filtered) {
    container.innerHTML = `<div class="empty"><strong>No matches</strong>Try a different search term.</div>`;
    return;
  }

  const html = items.map(item => {
    const id = getItemId(item);
    switch (currentTab) {
      case 'characters': return renderCharacter(item, id);
      case 'lore': return renderLore(item, id);
      case 'plotArcs': return renderArc(item, id);
      case 'relationships': return renderRelationship(item, id);
      case 'locations': return renderLocation(item, id);
      case 'factions': return renderFaction(item, id);
      case 'openThreads': return renderThread(item, id);
      case 'magicSystem': return renderMagic(item, id);
      default: return '';
    }
  }).join('');

  container.innerHTML = html;

  const statsEl = document.getElementById('stats-bar');
  if (!statsEl) {
    const allCounts = Object.entries(db).map(([k, v]) => {
      const labels = { characters: 'Characters', lore: 'Lore', plotArcs: 'Arcs', relationships: 'Bonds', locations: 'Locations', factions: 'Factions', openThreads: 'Threads', magicSystem: 'Magic' };
      return `<div class="stat"><div class="stat-n">${v.length}</div><div class="stat-l">${labels[k]||k}</div></div>`;
    }).join('');
  }
}

load();
</script>
</body>
</html>
